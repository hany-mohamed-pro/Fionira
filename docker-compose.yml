version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rapids1-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rapid_s1
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
